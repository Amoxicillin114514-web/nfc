<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>白极Hub</title>

<div id="info-box">
    <div id="timezone" class="big glow"></div>
    <div id="date" class="small"></div>
    <div id="time" class="big glow"></div>
    <div id="location" class="small"></div>
</div>

<style>
#info-box {
    text-align: center;
    margin-top: 40px;
    color: white;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

.big {
    font-size: 36px;
    font-weight: bold;
}

.small {
    font-size: 16px;
    opacity: 0.85;
    margin-top: 6px;
}

.glow {
    text-shadow: 0 0 10px rgba(255,255,255,0.8),
                 0 0 20px rgba(255,255,255,0.6);
}
</style>

<script>
async function init() {
    let timezoneText = "Time";
    let timeZone = "UTC";
    let locationText = "Loading...";

    try {
        let res = await fetch("https://ipapi.co/json/");
        let data = await res.json();

        let country = data.country;
        let countryName = data.country_name;
        let city = data.city;
        let org = data.org || "";

        timeZone = data.timezone || "UTC";

        // 🌍 多语言模板
        let langMap = {
            "CN": {
                time: "北京时间",
                text: "当前出口IP："
            },
            "JP": {
                time: "東京時間",
                text: "現在の出口IP："
            },
            "US": {
                time: "Local Time",
                text: "Your Exit IP:"
            },
            "KR": {
                time: "현재 시간",
                text: "현재 출구 IP:"
            }
        };

        let lang = langMap[country] || {
            time: countryName + " Time",
            text: "Exit IP:"
        };

        timezoneText = lang.time;

        // 📍 位置文本（自动语言）
        let loc = city ? (countryName + " · " + city) : countryName;

        locationText = lang.text + " " + loc;

        if (org) {
            locationText += " | " + org;
        }

        // 🔥 黑科技附加
        locationText += " ";

    } catch (e) {
        locationText = "Unable to detect network";
    }

    document.getElementById("timezone").innerText = timezoneText;
    document.getElementById("location").innerText = locationText;

    function updateTime() {
        let now = new Date();

        let dateStr = new Intl.DateTimeFormat(undefined, {
            timeZone: timeZone,
            year: "numeric",
            month: "long",
            day: "numeric"
        }).format(now);

        let timeStr = new Intl.DateTimeFormat(undefined, {
            timeZone: timeZone,
            hour: "2-digit",
            minute: "2-digit",
            second: "2-digit",
            hour12: false
        }).format(now);

        document.getElementById("date").innerText = dateStr;
        document.getElementById("time").innerText = timeStr;
    }

    setInterval(updateTime, 1000);
    updateTime();
}

init();
</script>

<style>
body {
    margin:0;
    font-family:Arial, sans-serif;
    background:url('bg.PNG') no-repeat center center/cover;
    color:#fff;
}

.overlay {
    background:rgba(0,0,0,0.5);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

h1 {
    font-size:32px;
    margin-bottom:30px;
    text-shadow:0 0 10px rgba(0,0,0,0.8);
}

button {
    width:85%;
    max-width:320px;
    padding:16px;
    margin:10px;
    font-size:16px;
    border:none;
    border-radius:12px;
    color:#fff;
    cursor:pointer;

    /* 半透明关键 */
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(10px);

    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
}

button img {
    width:22px;
    height:22px;
}

button:active {
    opacity:0.7;
}
</style>

</head>
<body>

<h1>欢迎来到白极Hub</h1>

B站主页
</button>

<!-- 推特 -->

</button>

<!-- QQ -->

<!-- 支付宝 -->

</div>

</body>
</html>
